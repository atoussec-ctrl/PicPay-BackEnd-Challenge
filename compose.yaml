name: transfer-service

services:
  api:
    build:
      context: .
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://postgres:5432/transfers
      DATABASE_USERNAME: transfers
      DATABASE_PASSWORD: transfers
      AUTHORIZER_BASE_URL: http://wiremock:8080
      NOTIFIER_BASE_URL: http://wiremock:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      wiremock:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: transfers
      POSTGRES_USER: transfers
      POSTGRES_PASSWORD: transfers
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transfers -d transfers"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  wiremock:
    image: wiremock/wiremock:3.13.2-alpine@sha256:f8c42a38dca3f4a1d7219af11c80438740f39eebb1505b0f029aed743c20e147
    command: ["--global-response-templating"]
    ports:
      - "8081:8080"
    volumes:
      - ./dev/wiremock:/home/wiremock:ro
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:
