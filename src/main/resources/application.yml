spring:
  application:
    name: transfer-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/transfers}
    username: ${DATABASE_USERNAME:transfers}
    password: ${DATABASE_PASSWORD:transfers}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_MAX_SIZE:10}
      minimum-idle: ${DATABASE_POOL_MIN_IDLE:2}
      connection-timeout: ${DATABASE_CONNECTION_TIMEOUT_MS:1000}
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: 20s

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
